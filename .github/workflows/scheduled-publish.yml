name: Scheduled Article Publisher

on:
  schedule:
    - cron: '20 23 19 7 *' # Phase 1: 3 hours later (July 19, 23:20 UTC)
    - cron: '20 3 20 7 *'  # Phase 2: 7 hours later (July 20, 03:20 UTC)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Scheduled Publisher
        run: node src/scripts/run-scheduled-publish.mjs

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "Github Action Poster"
          git config --global user.email "hello@praveentechworld.com"
          git add -A
          git diff-index --quiet HEAD || (git commit -m "chore: Auto-publish scheduled drafts" && git push origin main)
