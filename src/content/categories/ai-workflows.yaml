name: AI Workflows
description: Step-by-step guides to using AI effectively in your daily work and life. Learn to automate tasks, write better, and summarize faster with AI workflows.
icon: ⚡
order: 2
intro: The real power of AI is not in any single tool, it is in how you weave it into your daily workflow. This series teaches you repeatable processes for using AI to write faster, summarize smarter, automate tasks, and get more done without burning out.
  The key is knowing when to use AI and when to trust your own judgment. These guides share specific prompts, techniques, and workflows that work in real work environments. From drafting emails to analyzing data, you will find practical patterns you can apply immediately.
  Most people use AI wrong. They ask for generic output and get generic results. These guides teach you how to craft prompts that produce useful, specific, and editable output. Learn to work with AI as a collaborator, not a search engine, and your results will improve dramatically.
