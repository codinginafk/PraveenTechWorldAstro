name: Build in Public
description: Real stories of building software, scripts, and side projects in public. Learn from failures, share progress, and grow alongside the community.
icon: 🏗️
order: 12
intro: >
  Building in public means sharing the journey, the wins, the failures, and everything in between. This series documents real projects I have built, the lessons I have learned, and the mistakes I have made so you can learn from them too. No polished success stories, just honest building.

  Every article includes the exact prompts I used, the code that worked, and the bugs that nearly broke things. If you are learning to build with AI or trying to ship your first side project, these stories will save you time and frustration. Transparency beats perfection every time.

  You will see the ugly first drafts, the debugging sessions that took hours, and the moments when giving up felt easier than pushing through. The goal is to show you what real building looks like, not just the polished final product. Read these to gain confidence in your own building journey.

  New to building in public? Start with the latest article to see how AI tools like DeepSeek and Claude can accelerate prototyping while you focus on the hard parts, debugging, deployment, and iteration. Each post includes downloadable code snippets and prompt templates.
