name: Productivity
description: Practical productivity systems, techniques, and tools to get more done. Learn time management, workflow automation, and focus strategies that actually work.
icon: 🎯
order: 3
intro: Productivity is about working smarter, not harder. These guides explore real systems and techniques, from time management methods to workflow automation, that help you focus on what matters and stop wasting energy on busy work.
  Most productivity advice is generic and forgets that everyone works differently. These guides focus on approaches that adapt to your style. Learn to batch tasks, set boundaries around deep work, use the right tools without drowning in them, and measure progress instead of activity.
  Productivity is not about doing more. It is about doing the right things without burning out. These guides help you build a system that works with your brain, not against it. No rigid schedules, no guilt trips, just practical methods that stick.
  Whether you work from home, in an office, or on the road, you will find techniques that fit your environment. Each article includes specific prompts and tools you can try today, not abstract advice that requires a complete lifestyle overhaul. Pick one technique, test it for a week, and keep what works.
