<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9ecef" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.6"/>
  <circle cx="720" cy="60" r="80" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="760" cy="100" r="50" fill="#8b5cf6" opacity="0.08"/>
  <circle cx="60" cy="340" r="70" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="100" cy="310" r="40" fill="#8b5cf6" opacity="0.08"/>
  <!-- Left: Envelope -->
  <g transform="translate(130, 90)">
    <rect x="0" y="20" width="180" height="130" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
    <path d="M0,20 L90,90 L180,20" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linejoin="round" opacity="0.5"/>
    <!-- Sparkle on envelope -->
    <g transform="translate(50, 120)">
      <line x1="0" y1="-12" x2="0" y2="12" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="-8" y1="-8" x2="8" y2="8" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line x1="8" y1="-8" x2="-8" y2="8" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </g>
  </g>
  <!-- Right: Chat/AI bubble with text lines -->
  <g transform="translate(430, 70)">
    <rect x="0" y="40" width="240" height="160" rx="16" fill="#f3eefe" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- AI sparkle icon top-right corner -->
    <g transform="translate(200, 10)">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <!-- Email subject line -->
    <rect x="20" y="60" width="200" height="6" rx="3" fill="#8b5cf6" opacity="0.2"/>
    <text x="20" y="55" font-family="sans-serif" font-size="10" fill="#8b5cf6" opacity="0.6">Subject:</text>
    <rect x="20" y="80" width="180" height="6" rx="3" fill="#8b5cf6" opacity="0.4"/>
    <rect x="20" y="100" width="200" height="6" rx="3" fill="#8b5cf6" opacity="0.25"/>
    <rect x="20" y="120" width="160" height="6" rx="3" fill="#8b5cf6" opacity="0.25"/>
    <rect x="20" y="140" width="190" height="6" rx="3" fill="#8b5cf6" opacity="0.25"/>
    <rect x="20" y="160" width="140" height="6" rx="3" fill="#8b5cf6" opacity="0.25"/>
    <!-- Arrow indicator -->
    <path d="M220,180 L230,180" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Curved arrow from envelope to AI bubble -->
  <path d="M310,150 Q370,60 420,100" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Reply rate stat -->
  <g transform="translate(300, 280)">
    <rect x="0" y="0" width="200" height="45" rx="10" fill="#8b5cf6" opacity="0.08"/>
    <text x="100" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">With AI prompts</text>
    <text x="100" y="36" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="800" fill="#8b5cf6">27% Reply Rate</text>
  </g>
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#8b5cf6" opacity="0.9">Write Emails That Actually Get Replies</text>
</svg>