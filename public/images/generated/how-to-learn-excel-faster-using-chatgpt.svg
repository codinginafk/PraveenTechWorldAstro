<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Dynamic Gradient Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fbf7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#10b981" flood-opacity="0.15"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Core Illustration Card -->
  <g filter="url(#shadow)">
    <rect x="80" y="60" width="640" height="280" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  </g>

  <!-- Left Side: Large Emoji Badge -->
  <rect x="120" y="100" width="120" height="120" rx="24" fill="url(#badgeGrad)" opacity="0.9"/>
  <text x="180" y="174" text-anchor="middle" font-family="'Segoe UI Emoji', Arial" font-size="54" fill="#ffffff">📊</text>

  <!-- Right Side: Content Details -->
  <rect x="270" y="100" width="130" height="26" rx="13" fill="#10b981" fill-opacity="0.1"/>
  <text x="335" y="117" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="10" fill="#10b981" letter-spacing="1.5">PRODUCTIVITY</text>
  
  <text x="270" y="170" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="34" fill="#0f172a">Excel + ChatGPT</text>
  <text x="270" y="215" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="18" fill="#64748b">Learn formulas and macros in seconds</text>

  <line x1="270" y1="250" x2="680" y2="250" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Footer description details -->
  <text x="270" y="285" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#0f172a">Smart spreadsheet automation</text>
  <text x="270" y="305" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#94a3b8">PraveenTechWorld Practical Guide Series</text>
</svg>