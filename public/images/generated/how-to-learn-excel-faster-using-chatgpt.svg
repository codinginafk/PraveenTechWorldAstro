<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>

  <!-- Excel spreadsheet icon (left) -->
  <rect x="80" y="100" width="240" height="200" rx="12" fill="#ffffff" stroke="#c6c6c6" stroke-width="2"/>
  <rect x="80" y="100" width="240" height="36" rx="12" fill="#217346"/>
  <rect x="80" y="112" width="240" height="12" fill="#217346"/>
  <text x="200" y="124" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Excel</text>

  <!-- Spreadsheet grid lines -->
  <line x1="120" y1="136" x2="120" y2="300" stroke="#c6c6c6" stroke-width="1"/>
  <line x1="160" y1="136" x2="160" y2="300" stroke="#c6c6c6" stroke-width="1"/>
  <line x1="200" y1="136" x2="200" y2="300" stroke="#c6c6c6" stroke-width="1"/>
  <line x1="240" y1="136" x2="240" y2="300" stroke="#c6c6c6" stroke-width="1"/>
  <line x1="280" y1="136" x2="280" y2="300" stroke="#c6c6c6" stroke-width="1"/>

  <line x1="80" y1="172" x2="320" y2="172" stroke="#c6c6c6" stroke-width="1"/>
  <line x1="80" y1="208" x2="320" y2="208" stroke="#c6c6c6" stroke-width="1"/>
  <line x1="80" y1="244" x2="320" y2="244" stroke="#c6c6c6" stroke-width="1"/>
  <line x1="80" y1="280" x2="320" y2="280" stroke="#c6c6c6" stroke-width="1"/>

  <!-- Spreadsheet data cells -->
  <text x="140" y="160" text-anchor="middle" fill="#555555" font-family="Arial, sans-serif" font-size="11">Q1</text>
  <text x="180" y="160" text-anchor="middle" fill="#555555" font-family="Arial, sans-serif" font-size="11">Q2</text>
  <text x="220" y="160" text-anchor="middle" fill="#555555" font-family="Arial, sans-serif" font-size="11">Q3</text>
  <text x="260" y="160" text-anchor="middle" fill="#555555" font-family="Arial, sans-serif" font-size="11">Q4</text>
