<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9ecef" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.6"/>

  <!-- Decorative circles top-right -->
  <circle cx="720" cy="60" r="80" fill="#4a90d9" opacity="0.06"/>
  <circle cx="760" cy="100" r="50" fill="#4a90d9" opacity="0.08"/>

  <!-- Decorative circles bottom-left -->
  <circle cx="60" cy="340" r="70" fill="#4a90d9" opacity="0.06"/>
  <circle cx="100" cy="310" r="40" fill="#4a90d9" opacity="0.08"/>

  <!-- Left side: Chat bubble icon -->
  <rect x="80" y="120" width="200" height="160" rx="20" fill="#4a90d9" opacity="0.12"/>
  <rect x="90" y="130" width="180" height="140" rx="16" fill="none" stroke="#4a90d9" stroke-width="2.5"/>
  <!-- Chat lines inside bubble -->
  <line x1="120" y1="170" x2="230" y2="170" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="120" y1="192" x2="210" y2="192" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="120" y1="214" x2="180" y2="214" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Chat tail -->
  <path d="M140 270 L140 300 L170 270" fill="none" stroke="#4a90d9" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Dots suggesting AI/typing -->
  <circle cx="190" cy="238" r="5" fill="#4a90d9" opacity="0.4"/>
  <circle cx="206" cy="238" r="5" fill="#4a90d9" opacity="0.55"/>
  <circle cx="222" cy="238" r="5" fill="#4a90d9" opacity="0.7"/>

  <!-- Center: Shield icon -->
  <path d="M400 80 L450 105 L450 160 C450 210 420 240 400 255 C380 240 350 210