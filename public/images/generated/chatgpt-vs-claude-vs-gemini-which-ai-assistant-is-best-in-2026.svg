<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9ecef" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.6"/>
  <!-- ChatGPT column -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="210" height="280" rx="14" fill="#fff" stroke="#10a37f" stroke-width="2.5"/>
    <rect x="75" y="20" width="60" height="60" rx="30" fill="#10a37f"/>
    <!-- ChatGPT icon: simplified chat bubble -->
    <path d="M95,32 L115,32 A8,8 0 0,1 123,40 L123,55 A8,8 0 0,1 115,63 L108,63 L108,70 L100,63 L95,63 A8,8 0 0,1 87,55 L87,40 A8,8 0 0,1 95,32 Z" fill="white"/>
    <text x="105" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#10a37f">ChatGPT</text>
    <text x="105" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">GPT-4 / OpenAI</text>
    <line x1="25" y1="150" x2="185" y2="150" stroke="#10a37f" stroke-width="1" opacity="0.3"/>
    <circle cx="105" cy="175" r="4" fill="#10a37f" opacity="0.7"/>
    <text x="120" y="179" font-family="sans-serif" font-size="12" fill="#444">Best for writing</text>
    <circle cx="105" cy="198" r="4" fill="#10a37f" opacity="0.5"/>
    <text x="120" y="202" font-family="sans-serif" font-size="12" fill="#444">Coding assistant</text>
    <circle cx="105" cy="221" r="4" fill="#10a37f" opacity="0.3"/>
    <text x="120" y="225" font-family="sans-serif" font-size="12" fill="#444">Versatile tasks</text>
    <!-- Free / $20 tag -->
    <rect x="55" y="250" width="100" height="22" rx="11" fill="#10a37f" opacity="0.1"/>
    <text x="105" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#10a37f">Free / $20 Pro</text>
  </g>
  <!-- Claude column -->
  <g transform="translate(295, 50)">
    <rect x="0" y="0" width="210" height="280" rx="14" fill="#fff" stroke="#d97706" stroke-width="2.5"/>
    <rect x="75" y="20" width="60" height="60" rx="30" fill="#d97706"/>
    <!-- Claude icon: simplified claude letter C -->
    <path d="M92,35 A25,25 0 0,1 117,32 L112,42 A16,16 0 0,0 95,44 L100,52 L93,51 L88,58 L95,60 L95,60 A18,18 0 0,0 118,49 L115,59 A26,26 0 0,1 88,65 Z" fill="white"/>
    <text x="105" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#d97706">Claude</text>
    <text x="105" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Anthropic</text>
    <line x1="25" y1="150" x2="185" y2="150" stroke="#d97706" stroke-width="1" opacity="0.3"/>
    <circle cx="105" cy="175" r="4" fill="#d97706" opacity="0.7"/>
    <text x="120" y="179" font-family="sans-serif" font-size="12" fill="#444">Long-form content</text>
    <circle cx="105" cy="198" r="4" fill="#d97706" opacity="0.5"/>
    <text x="120" y="202" font-family="sans-serif" font-size="12" fill="#444">Nuanced reasoning</text>
    <circle cx="105" cy="221" r="4" fill="#d97706" opacity="0.3"/>
    <text x="120" y="225" font-family="sans-serif" font-size="12" fill="#444">Large context</text>
    <rect x="55" y="250" width="100" height="22" rx="11" fill="#d97706" opacity="0.1"/>
    <text x="105" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#d97706">Free / $20 Pro</text>
  </g>
  <!-- Gemini column -->
  <g transform="translate(540, 50)">
    <rect x="0" y="0" width="210" height="280" rx="14" fill="#fff" stroke="#4285f4" stroke-width="2.5"/>
    <rect x="75" y="20" width="60" height="60" rx="30" fill="#4285f4"/>
    <!-- Gemini icon: simplified gem/star -->
    <polygon points="105,30 112,47 130,48 116,60 120,78 105,67 90,78 94,60 80,48 98,47" fill="white"/>
    <text x="105" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#4285f4">Gemini</text>
    <text x="105" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Google DeepMind</text>
    <line x1="25" y1="150" x2="185" y2="150" stroke="#4285f4" stroke-width="1" opacity="0.3"/>
    <circle cx="105" cy="175" r="4" fill="#4285f4" opacity="0.7"/>
    <text x="120" y="179" font-family="sans-serif" font-size="12" fill="#444">Google integration</text>
    <circle cx="105" cy="198" r="4" fill="#4285f4" opacity="0.5"/>
    <text x="120" y="202" font-family="sans-serif" font-size="12" fill="#444">Research & facts</text>
    <circle cx="105" cy="221" r="4" fill="#4285f4" opacity="0.3"/>
    <text x="120" y="225" font-family="sans-serif" font-size="12" fill="#444">Multimodal</text>
    <rect x="55" y="250" width="100" height="22" rx="11" fill="#4285f4" opacity="0.1"/>
    <text x="105" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#4285f4">Free / $20 Pro</text>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#333">Which AI Assistant Wins in 2026?</text>
</svg>