<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9ecef" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.6"/>
  <circle cx="720" cy="60" r="80" fill="#e74c3c" opacity="0.06"/>
  <circle cx="760" cy="100" r="50" fill="#e74c3c" opacity="0.08"/>
  <circle cx="60" cy="340" r="70" fill="#e74c3c" opacity="0.06"/>
  <circle cx="100" cy="310" r="40" fill="#e74c3c" opacity="0.08"/>
  <!-- Monitor outline -->
  <rect x="200" y="80" width="260" height="190" rx="12" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <rect x="210" y="92" width="240" height="155" rx="6" fill="#fce8e8" stroke="none"/>
  <!-- Monitor stand -->
  <rect x="300" y="270" width="60" height="20" rx="4" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
  <rect x="270" y="290" width="120" height="8" rx="4" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
  <!-- Hourglass/spinner inside monitor -->
  <g transform="translate(330, 170)">
    <path d="M-25,-35 L25,-35 L-25,35 L25,35" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linejoin="round" opacity="0.5"/>
    <path d="M-25,-35 L25,-35 L0,0 Z" fill="#e74c3c" opacity="0.3"/>
    <path d="M-25,35 L25,35 L0,0 Z" fill="#e74c3c" opacity="0.15"/>
    <!-- Spinning dots -->
    <circle cx="0" cy="-18" r="4" fill="#e74c3c" opacity="0.9"/>
    <circle cx="12" cy="8" r="3" fill="#e74c3c" opacity="0.4"/>
    <circle cx="-12" cy="8" r="3" fill="#e74c3c" opacity="0.4"/>
  </g>
  <!-- Loading bar at bottom of screen -->
  <rect x="230" y="218" width="200" height="12" rx="6" fill="#fce8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <rect x="234" y="222" width="60" height="4" rx="2" fill="#e74c3c" opacity="0.7"/>
  <!-- Right side: Windows logo with question mark -->
  <g transform="translate(540, 140)">
    <rect x="-40" y="-40" width="80" height="80" rx="8" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <path d="M-25,-25 L-25,0 L0,0 L0,-25 Z" fill="#e74c3c" opacity="0.7"/>
    <path d="M8,-25 L8,0 L33,0 L33,-25 Z" fill="#e74c3c" opacity="0.4"/>
    <path d="M-25,8 L-25,33 L0,33 L0,8 Z" fill="#e74c3c" opacity="0.4"/>
    <path d="M8,8 L8,33 L33,33 L33,8 Z" fill="#e74c3c" opacity="0.2"/>
  </g>
  <!-- Text: System Lagging -->
  <text x="400" y="355" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#e74c3c" opacity="0.8">System Running Slow?</text>
  <text x="400" y="378" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">Windows loading stuck or lagging?</text>
</svg>