<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f0f4f8"/>
  <!-- Monitor/PC -->
  <rect x="80" y="60" width="280" height="200" rx="10" fill="#2c3e50" opacity="0.9"/>
  <rect x="90" y="70" width="260" height="180" rx="4" fill="#ecf0f1"/>
  <rect x="100" y="85" width="60" height="8" rx="3" fill="#e74c3c" opacity="0.7"/>
  <rect x="100" y="105" width="120" height="8" rx="3" fill="#7f8c8d" opacity="0.5"/>
  <rect x="100" y="125" width="100" height="8" rx="3" fill="#7f8c8d" opacity="0.5"/>
  <rect x="100" y="145" width="80" height="8" rx="3" fill="#7f8c8d" opacity="0.5"/>
  <rect x="100" y="165" width="110" height="8" rx="3" fill="#7f8c8d" opacity="0.5"/>
  <!-- Screen overlay - speed gauge -->
  <rect x="170" y="85" width="160" height="120" rx="6" fill="#fff" opacity="0.9"/>
  <path d="M210 170 A50 50 0 0 1 310 170" stroke="#e74c3c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M220 170 A40 40 0 0 1 300 170" stroke="#f39c12" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M230 170 A30 30 0 0 1 290 170" stroke="#27ae60" stroke-width="4" fill="none" stroke-linecap="round"/>
  <line x1="260" y1="170" x2="280" y2="130" stroke="#333" stroke-width="2"/>
  <circle cx="280" cy="130" r="4" fill="#e74c3c"/>
  <!-- Stand -->
  <rect x="190" y="260" width="60" height="8" rx="2" fill="#2c3e50"/>
  <rect x="170" y="268" width="100" height="10" rx="3" fill="#2c3e50"/>
  <!-- Right side - optimization icons -->
  <circle cx="540" cy="110" r="40" fill="#3498db" opacity="0.85"/>
  <text x="540" y="116" text-anchor="middle" font-family="Arial" font-size="30" fill="#fff" font-weight="bold">⚡</text>
  <text x="540" y="170" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" font-weight="bold">Speed Up</text>
  <circle cx="540" cy="240" r="40" fill="#e67e22" opacity="0.85"/>
  <text x="540" y="246" text-anchor="middle" font-family="Arial" font-size="30" fill="#fff" font-weight="bold">🛡</text>
  <text x="540" y="300" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" font-weight="bold">Optimize</text>
  <!-- Arrow pointing to PC -->
  <path d="M440 175 Q480 175 500 175" stroke="#7f8c8d" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="400" y="355" text-anchor="middle" font-family="Arial" font-size="22" fill="#2c3e50" font-weight="bold">Windows Slow Performance Fix</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="13" fill="#7f8c8d">Step-by-step guide to speed up your PC</text>
</svg>