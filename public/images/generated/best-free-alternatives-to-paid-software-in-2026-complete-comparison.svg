<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9ecef" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.6"/>
  <circle cx="720" cy="60" r="80" fill="#10b981" opacity="0.06"/>
  <circle cx="760" cy="100" r="50" fill="#10b981" opacity="0.08"/>
  <circle cx="60" cy="340" r="70" fill="#10b981" opacity="0.06"/>
  <circle cx="100" cy="310" r="40" fill="#10b981" opacity="0.08"/>
  <!-- Left: Paid column with $$ -->
  <g transform="translate(100, 60)">
    <rect x="0" y="0" width="180" height="260" rx="12" fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="6,3"/>
    <rect x="60" y="12" width="60" height="60" rx="12" fill="#fce8e8"/>
    <text x="90" y="50" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#e74c3c">$</text>
    <text x="90" y="108" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#e74c3c">Paid Software</text>
    <line x1="30" y1="130" x2="150" y2="130" stroke="#e74c3c" stroke-width="1" opacity="0.3"/>
    <text x="90" y="152" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">Adobe Creative Cloud</text>
    <text x="90" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">Microsoft 365</text>
    <text x="90" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">NordVPN</text>
    <text x="90" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">1Password</text>
    <text x="90" y="245" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#e74c3c">$2,400/yr</text>
  </g>
  <!-- VS label -->
  <g transform="translate(370, 160)">
    <circle cx="30" cy="30" r="32" fill="#10b981" opacity="0.12"/>
    <text x="30" y="36" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="800" fill="#10b981">VS</text>
  </g>
  <!-- Right: Free column with checkmarks -->
  <g transform="translate(480, 60)">
    <rect x="0" y="0" width="200" height="260" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2.5"/>
    <rect x="65" y="12" width="55" height="55" rx="12" fill="#d1fae5"/>
    <text x="92" y="48" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#10b981">$0</text>
    <text x="100" y="108" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#10b981">Free Alternatives</text>
    <line x1="30" y1="130" x2="170" y2="130" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <text x="100" y="152" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">GIMP</text>
    <text x="100" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">LibreOffice</text>
    <text x="100" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">ProtonVPN Free</text>
    <text x="100" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Bitwarden</text>
    <text x="100" y="245" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#10b981">Save $2,400/yr</text>
  </g>
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#10b981" opacity="0.9">Pay Less, Get More — Free Software Works</text>
</svg>