<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f0f4f8"/>
  <!-- Office suite icon -->
  <rect x="60" y="80" width="140" height="180" rx="12" fill="#4f86c6" opacity="0.9"/>
  <rect x="80" y="110" width="100" height="8" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="80" y="130" width="80" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="80" y="150" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="80" y="200" width="40" height="40" rx="4" fill="#fff" opacity="0.3"/>
  <!-- Photo editor icon -->
  <rect x="240" y="80" width="140" height="180" rx="12" fill="#e67e22" opacity="0.9"/>
  <circle cx="310" cy="140" r="20" fill="#fff" opacity="0.7"/>
  <rect x="260" y="180" width="100" height="8" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="260" y="200" width="80" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="260" y="220" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <circle cx="310" cy="140" r="10" fill="#e67e22" opacity="0.5"/>
  <!-- Video player icon -->
  <rect x="420" y="80" width="140" height="180" rx="12" fill="#27ae60" opacity="0.9"/>
  <polygon points="475,120 475,200 540,160" fill="#fff" opacity="0.8"/>
  <rect x="440" y="220" width="100" height="8" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="440" y="238" width="80" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <!-- Antivirus icon -->
  <rect x="600" y="80" width="140" height="180" rx="12" fill="#8e44ad" opacity="0.9"/>
  <path d="M670 120 L640 180 H660 L650 230 L690 170 H668 Z" fill="#fff" opacity="0.8"/>
  <rect x="620" y="220" width="100" height="8" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="620" y="238" width="80" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <!-- Labels -->
  <text x="130" y="290" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Office Suite</text>
  <text x="310" y="290" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Photo Editor</text>
  <text x="490" y="290" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Media Player</text>
  <text x="670" y="290" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Antivirus</text>
  <!-- Title -->
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="22" fill="#2c3e50" font-weight="bold">Free Software Alternatives</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial" font-size="13" fill="#7f8c8d">Open source tools that save you money</text>
</svg>