<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Workbench Background (Soft Linen/Cream Wood Tone) -->
  <rect width="1200" height="600" fill="#f4ebe1" />
  
  <!-- Desk wood lines (very subtle) -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#ebdcb9" stroke-width="1" stroke-opacity="0.4" />
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#ebdcb9" stroke-width="1" stroke-opacity="0.4" />

  <!-- Flat Technical Blueprint Sheet -->
  <rect x="150" y="60" width="900" height="460" rx="6" fill="#1e293b" stroke="#cbd5e1" stroke-width="2" stroke-opacity="0.1" />
  
  <!-- Blueprint Gridlines -->
  <g stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05">
    <!-- Verticals -->
    <line x1="200" y1="60" x2="200" y2="520" />
    <line x1="300" y1="60" x2="300" y2="520" />
    <line x1="400" y1="60" x2="400" y2="520" />
    <line x1="500" y1="60" x2="500" y2="520" />
    <line x1="600" y1="60" x2="600" y2="520" />
    <line x1="700" y1="60" x2="700" y2="520" />
    <line x1="800" y1="60" x2="800" y2="520" />
    <line x1="900" y1="60" x2="900" y2="520" />
    <line x1="1000" y1="60" x2="1000" y2="520" />
    <!-- Horizontals -->
    <line x1="150" y1="100" x2="1050" y2="100" />
    <line x1="150" y1="200" x2="1050" y2="200" />
    <line x1="150" y1="300" x2="1050" y2="300" />
    <line x1="150" y1="400" x2="1050" y2="400" />
    <line x1="150" y1="500" x2="1050" y2="500" />
  </g>

  <!-- Technical Schematic Flows -->
  <!-- Prompt Input Block -->
  <rect x="220" y="240" width="160" height="80" rx="4" fill="#334155" stroke="#38bdf8" stroke-width="1.5" />
  <text x="300" y="275" font-family="monospace" font-size="14" fill="#38bdf8" text-anchor="middle">INPUT PROMPT</text>
  <text x="300" y="295" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Realistic workbench..."</text>

  <!-- Connection Line 1 -->
  <path d="M 380 280 L 460 280" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4,4" />

  <!-- Model Nodes Center Block -->
  <!-- Flux.2 Node -->
  <circle cx="540" cy="180" r="45" fill="#475569" stroke="#86efac" stroke-width="2" />
  <text x="540" y="185" font-family="monospace" font-size="13" fill="#86efac" text-anchor="middle">FLUX.2</text>
  
  <!-- Midjourney Node -->
  <circle cx="540" cy="280" r="45" fill="#475569" stroke="#94a3b8" stroke-width="1.5" />
  <text x="540" y="285" font-family="monospace" font-size="13" fill="#cbd5e1" text-anchor="middle">MIDJOURNEY</text>
  
  <!-- Recraft Node -->
  <circle cx="540" cy="380" r="45" fill="#475569" stroke="#94a3b8" stroke-width="1.5" />
  <text x="540" y="385" font-family="monospace" font-size="13" fill="#cbd5e1" text-anchor="middle">RECRAFT</text>

  <!-- Connection Lines Center to Output -->
  <path d="M 585 180 Q 720 220 780 260" fill="none" stroke="#86efac" stroke-width="2" />
  <path d="M 585 280 L 780 280" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-opacity="0.5" />
  <path d="M 585 380 Q 720 340 780 300" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-opacity="0.5" />

  <!-- Output Asset Block -->
  <rect x="780" y="220" width="200" height="120" rx="4" fill="#334155" stroke="#f43f5e" stroke-width="2" />
  <text x="880" y="270" font-family="monospace" font-size="14" fill="#f43f5e" text-anchor="middle">VECTOR SVG / PNG</text>
  <text x="880" y="295" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">High-Fidelity Output</text>
  
  <!-- Subtle Blueprint Labels -->
  <text x="180" y="100" font-family="monospace" font-size="12" fill="#475569">MODEL EVALUATION BENCHMARK v2.0</text>
  <text x="880" y="490" font-family="monospace" font-size="11" fill="#475569">SCALE: 1.000 // DEPT: 32-BIT</text>

  <!-- Cozy Workbench Coffee Mug (Top-Down View, Bottom-Right) -->
  <g transform="translate(1080, 480)">
    <!-- Mug Shadow -->
    <circle cx="2" cy="4" r="54" fill="#1e1b18" fill-opacity="0.15" />
    <!-- Mug Body -->
    <circle cx="0" cy="0" r="52" fill="#fffdfa" stroke="#e3dcd3" stroke-width="2" />
    <!-- Mug Handle -->
    <path d="M 46 -15 C 65 -15 65 15 46 15" fill="none" stroke="#fffdfa" stroke-width="14" stroke-linecap="round" />
    <!-- Coffee Surface -->
    <circle cx="0" cy="0" r="42" fill="#3b2314" />
    <!-- Coffee Foam / Ring -->
    <circle cx="0" cy="0" r="39" fill="none" stroke="#523624" stroke-width="2" />
    <path d="M -15 -25 C -5 -30 15 -20 20 -15" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Sticky Note with PTW Branding (Top-Right of Blueprint) -->
  <g transform="translate(1020, 100) rotate(5)">
    <!-- Shadow -->
    <rect x="2" y="2" width="110" height="110" fill="#1e1b18" fill-opacity="0.08" />
    <!-- Yellow Note -->
    <rect width="110" height="110" fill="#fef9c3" stroke="#fef08a" stroke-width="1" />
    <!-- Handdrawn PTW Logo -->
    <rect x="20" y="30" width="70" height="50" rx="3" fill="none" stroke="#854d0e" stroke-width="2" stroke-dasharray="2,2" />
    <text x="55" y="60" font-family="monospace" font-size="18" font-weight="bold" fill="#854d0e" text-anchor="middle">PTW</text>
    <line x1="25" y1="70" x2="85" y2="70" stroke="#854d0e" stroke-width="1.5" />
  </g>
</svg>
