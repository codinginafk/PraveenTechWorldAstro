<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9ecef" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.6"/>
  <circle cx="720" cy="60" r="80" fill="#2563eb" opacity="0.06"/>
  <circle cx="760" cy="100" r="50" fill="#2563eb" opacity="0.08"/>
  <circle cx="60" cy="340" r="70" fill="#2563eb" opacity="0.06"/>
  <circle cx="100" cy="310" r="40" fill="#2563eb" opacity="0.08"/>
  <!-- Left: Windows Update error dialog -->
  <g transform="translate(200, 60)">
    <rect x="0" y="0" width="250" height="170" rx="10" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="0" y="0" width="250" height="36" rx="10" fill="#2563eb" opacity="0.1"/>
    <rect x="0" y="26" width="250" height="10" fill="#2563eb" opacity="0.1"/>
    <circle cx="20" cy="18" r="6" fill="#e74c3c" opacity="0.7"/>
    <!-- Error icon -->
    <circle cx="125" cy="75" r="22" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
    <line x1="125" y1="62" x2="125" y2="80" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="125" cy="90" r="2" fill="#e74c3c"/>
    <!-- Error text lines -->
    <line x1="80" y1="115" x2="180" y2="115" stroke="#555" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="60" y1="132" x2="200" y2="132" stroke="#555" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <!-- OK button -->
    <rect x="90" y="148" width="60" height="20" rx="4" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1"/>
    <text x="120" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e74c3c">OK</text>
  </g>
  <!-- Right: Slow internet indicator -->
  <g transform="translate(500, 80)">
    <!-- Wi-Fi icon with X -->
    <path d="M10,60 Q-15,35 10,10" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <path d="M-10,40 Q10,22 30,40" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M-25,25 Q10,-5 45,25" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <circle cx="10" cy="70" r="6" fill="#e74c3c"/>
    <!-- X mark over wifi -->
    <line x1="-30" y1="-5" x2="50" y2="75" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Center arrow connection -->
  <path d="M455,140 Q475,120 495,140" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <!-- Update code badge -->
  <g transform="translate(340, 280)">
    <rect x="0" y="0" width="120" height="30" rx="6" fill="#2563eb" opacity="0.1"/>
    <text x="60" y="20" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#2563eb">KB5089573</text>
  </g>
  <text x="400" y="355" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#2563eb" opacity="0.8">Update Error &amp; Slow Internet</text>
  <text x="400" y="378" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">Windows 11 KB5089573 causing issues?</text>
</svg>