<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0a1628"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a4a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.6"/>
  <circle cx="720" cy="60" r="80" fill="#4a90d9" opacity="0.06"/>
  <circle cx="760" cy="100" r="50" fill="#4a90d9" opacity="0.08"/>
  <circle cx="60" cy="340" r="70" fill="#4a90d9" opacity="0.06"/>
  <circle cx="100" cy="310" r="40" fill="#4a90d9" opacity="0.08"/>
  <!-- BSOD Screen -->
  <g transform="translate(160, 50)">
    <rect x="0" y="0" width="480" height="280" rx="12" fill="#1a3a6b" stroke="#2a5aab" stroke-width="2"/>
    <!-- Sad face emoji -->
    <circle cx="240" cy="75" r="35" fill="none" stroke="#89b4f8" stroke-width="2.5"/>
    <circle cx="225" cy="68" r="4" fill="#89b4f8"/>
    <circle cx="255" cy="68" r="4" fill="#89b4f8"/>
    <path d="M220,90 Q240,78 260,90" fill="none" stroke="#89b4f8" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Error message -->
    <text x="240" y="135" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#89b4f8">:( Your PC ran into a problem</text>
    <text x="240" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7a9de0">and needs to restart. We're just collecting</text>
    <text x="240" y="178" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7a9de0">some error info, and then we'll restart for you.</text>
    <!-- Stop code -->
    <rect x="130" y="200" width="220" height="28" rx="6" fill="none" stroke="#4a7ac0" stroke-width="1.5"/>
    <text x="240" y="219" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#89b4f8">STOP: 0x0000001A</text>
    <!-- Progress dots -->
    <circle cx="220" cy="250" r="3" fill="#89b4f8" opacity="0.4"/>
    <circle cx="235" cy="250" r="3" fill="#89b4f8" opacity="0.6"/>
    <circle cx="250" cy="250" r="3" fill="#89b4f8" opacity="0.8"/>
    <circle cx="265" cy="250" r="3" fill="#89b4f8" opacity="0.6"/>
    <circle cx="280" cy="250" r="3" fill="#89b4f8" opacity="0.4"/>
  </g>
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#89b4f8" opacity="0.9">Blue Screen of Death (BSOD)</text>
</svg>