  <!-- Title area -->
  <text x="80" y="75" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#202124">Google Analytics Dashboard</text>
  <rect x="80" y="90" width="60" height="4" rx="2" fill="#4285f4"/>

  <!-- Left side: Bar chart -->
