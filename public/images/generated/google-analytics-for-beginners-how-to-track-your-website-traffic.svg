    <text x="25" y="128" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9aa0a6" text-anchor="end">3k</text>
    <text x="25" y="163" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9aa0a6" text-anchor="end">2k</text>
    <text x="25" y="198" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9aa0a6" text-anchor="end">1k</text>
    <text x="25" y="203" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9aa0a6" text-anchor="end">0</text>

