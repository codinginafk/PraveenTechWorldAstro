<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <circle cx="40" cy="40" r="1" fill="#e0e0e0"/>
    </pattern>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7B61FF;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#grid)"/>
  
  <!-- Decorative background shapes -->
  <circle cx="120" cy="350" r="120" fill="url(#grad1)"/>
  <circle cx="700" cy="80" r="100" fill="url(#grad1)"/>
  
  <!-- Title area -->
  <text x="400" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" letter-spacing="1">HOW TO AUTOMATE YOUR DAILY WORKFLOW</text>
  <rect x="250" y="55" width="300" height="2" rx="1" fill="url(#grad2)"/>
  
  <!-- Flow line connecting elements -->
  <path d="M 100 200 L 220 200" stroke="#c0c0c0" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M 280 200 L 370 200" stroke="#c0c0c0" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M 430 200 L 520 200" stroke="#c0c0c0" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M 580 200 L 670 200" stroke="#c0c0c0" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- Arrow heads on flow line -->
  <polygon points="218,195 228,200 218,205" fill="#c0c0c0"/>
  <polygon points="368,195 378,200 368,205" fill="#c0c0c0"/>
  <polygon points="518,195 528,200 518,205" fill="#c0c0c0"/>
  <polygon points="668,195 678,200 668,205" fill="#c0c0c0"/>
  
