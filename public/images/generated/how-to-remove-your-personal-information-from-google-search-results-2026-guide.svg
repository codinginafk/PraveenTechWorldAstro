<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Decorative background circles -->
  <circle cx="700" cy="350" r="120" fill="#e8eaed" opacity="0.5"/>
  <circle cx="100" cy="50" r="80" fill="#e8eaed" opacity="0.4"/>
  
  <!-- Title text -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#202124">How to Remove Your Personal Information</text>
