  <circle cx="594" cy="135" r="3.5" fill="#fbbc05"/>
  <circle cx="606" cy="135" r="3.5" fill="#34a853"/>
  
  <!-- Search results area -->
  <rect x="150" y="180" width="500" height="170" rx="8" fill="#ffffff" stroke="#dadce0" stroke-width="1.5"/>
  
